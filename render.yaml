services:
  - type: web
    name: aura-food-backend
    runtime: python
    rootDir: vibeFoodBackend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///./vibe_food.db
      - key: OPENAI_API_KEY
        sync: false
